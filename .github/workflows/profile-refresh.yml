name: Weekly profile README refresh

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate auto section
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh repo list glitch-exec-labs \
            --visibility public \
            --no-archived \
            --limit 200 \
            --json name,description,url,pushedAt,stargazerCount,primaryLanguage \
            --jq 'sort_by(.pushedAt) | reverse' > repos.json

          {
            echo "<!-- AUTO:BEGIN -->"
            echo "<!-- This section is auto-refreshed weekly by .github/workflows/profile-refresh.yml — do not edit by hand. -->"
            echo ""
            echo "## 📦 All public repos"
            echo ""
            echo "_Last refreshed: $(date -u +'%Y-%m-%d') · sorted by most recent push_"
            echo ""
            echo "| Repo | Description | Lang | ★ | Last push |"
            echo "| --- | --- | --- | --- | --- |"
            jq -r '.[] | "| [\(.name)](\(.url)) | \((.description // "—") | gsub("\\|"; "\\|")) | \((.primaryLanguage.name // "—")) | \(.stargazerCount) | \(.pushedAt[0:10]) |"' repos.json
            echo ""
            echo "<!-- AUTO:END -->"
          } > auto.md

          python3 - <<'PY'
          import re, pathlib
          readme = pathlib.Path("README.md")
          src = readme.read_text()
          auto = pathlib.Path("auto.md").read_text()
          pattern = re.compile(r"<!-- AUTO:BEGIN -->.*?<!-- AUTO:END -->", re.DOTALL)
          if pattern.search(src):
              new = pattern.sub(auto.rstrip(), src)
          else:
              # First run: inject before the final snake animation block, else append.
              anchor = "<!-- Snake contribution animation"
              if anchor in src:
                  new = src.replace(anchor, auto + "\n" + anchor, 1)
              else:
                  new = src.rstrip() + "\n\n" + auto
          readme.write_text(new)
          PY

          rm -f repos.json auto.md

      - name: Commit if changed
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: weekly profile README refresh"
          git push
